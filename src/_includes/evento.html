<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ nombre }} — WKC Uruguay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c8a24a; --gold-bright: #e3bf63; --black: #0a0a0a;
  --black-soft: #131313; --black-card: #1a1a1a; --gray: #9a9a9a;
  --gray-light: #d4d4d4; --border: rgba(200,162,74,0.18);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Barlow', sans-serif; background: var(--black); color: var(--gray-light); line-height: 1.7; }
h1,h2,h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; color: #fff; line-height: 1.05; }
a { color: var(--gold); text-decoration: none; }

.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; background: rgba(10,10,10,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
.nav-logo { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 24px; letter-spacing: 0.08em; color: #fff; display: flex; align-items: center; gap: 10px; }
.nav-logo span { color: var(--gold); }
.nav-logo::before { content:""; width: 8px; height: 26px; background: var(--gold); transform: skewX(-12deg); }
.nav .back { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.08em; font-size: 14px; }

.ev-hero {
  padding: 140px 28px 60px;
  max-width: 1000px; margin: 0 auto;
  background: radial-gradient(circle at 80% 20%, rgba(200,162,74,0.1), transparent 50%);
}
.ev-hero .kicker { font-family: 'Oswald', sans-serif; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; font-size: 14px; margin-bottom: 12px; }
.ev-hero h1 { font-size: clamp(40px, 9vw, 88px); font-weight: 700; }

.ev-meta {
  max-width: 1000px; margin: 0 auto; padding: 0 28px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 1px;
  background: var(--border); border: 1px solid var(--border);
}
.ev-meta div { background: var(--black-card); padding: 24px; }
.ev-meta .k { text-transform: uppercase; letter-spacing: 0.1em; font-size: 13px; color: var(--gray); }
.ev-meta .v { font-family: 'Oswald', sans-serif; font-size: 24px; color: #fff; margin-top: 6px; }

.ev-body { max-width: 1000px; margin: 0 auto; padding: 48px 28px 40px; font-size: 18px; }
.ev-body p { margin-bottom: 18px; }
.ev-body strong { color: var(--gold); }

.ev-cta { max-width: 1000px; margin: 0 auto 100px; padding: 0 28px; }
.btn { display: inline-block; font-family: 'Oswald', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; font-size: 15px; padding: 16px 40px; background: var(--gold); color: var(--black); border: 2px solid var(--gold); cursor: pointer; transition: all 0.25s ease; clip-path: polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%); }
.btn:hover { background: var(--gold-bright); }
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">WKC<span>.</span>UY</a>
  <a href="/eventos/" class="back">← Eventos</a>
</nav>

<div class="ev-hero">
  <div class="kicker">◆ Evento oficial WKC</div>
  <h1>{{ nombre }}</h1>
</div>

<div class="ev-meta">
  <div><div class="k">Fecha</div><div class="v">{{ fecha }}</div></div>
  <div><div class="k">Lugar</div><div class="v">{{ lugar }}</div></div>
  <div><div class="k">Estado</div><div class="v">Inscripción abierta</div></div>
</div>

<div class="ev-body">
  {{ content }}
</div>

<div class="ev-cta">
  <a href="/inscripcion/" class="btn">Inscribirme a este evento</a>
</div>

</body>
</html>
