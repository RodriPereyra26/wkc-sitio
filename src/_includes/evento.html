<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ nombre }} - WKC Uruguay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff4444, #ff8800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .meta {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #ff8800;
        }
        .meta p { margin: 10px 0; font-size: 16px; color: #aaa; }
        .meta strong { color: #ff8800; }
        .content {
            font-size: 16px;
            line-height: 1.8;
            color: #ccc;
        }
        .content p { margin-bottom: 15px; }
        a { color: #ff8800; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back { margin-top: 40px; padding-top: 20px; border-top: 1px solid #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ nombre }}</h1>
        <div class="meta">
            <p><strong>📅 Fecha:</strong> {{ fecha }}</p>
            <p><strong>📍 Lugar:</strong> {{ lugar }}</p>
        </div>
        <div class="content">
            {{ content }}
        </div>
        <div class="back">
            <a href="/">← Volver a home</a>
        </div>
    </div>
</body>
</html>
